# Same checks as scripts/check.sh — if they disagree, that's a harness bug. CI is authoritative.
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4 # reads global.json
      - run: dotnet format backend/R8er.slnx --verify-no-changes
      - run: dotnet test backend/R8er.slnx --nologo
      - run: docker compose config --quiet && docker compose --profile relay config --quiet

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
      - run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
        working-directory: agent
      - run: go vet ./... && go build ./... && go test ./...
        working-directory: agent
